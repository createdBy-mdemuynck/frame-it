version: '3.8'

services:
  # Backoffice (Server/API)
  backoffice:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: frameit-backoffice
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - SESSION_SECRET=frameit-production-secret-change-me
    volumes:
      # Mount uploads directory to persist data
      - ./server/uploads:/app/uploads
    networks:
      - frameit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Frontoffice (Web/UI)
  frontoffice:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: frameit-frontoffice
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    networks:
      - frameit-network
    depends_on:
      backoffice:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

networks:
  frameit-network:
    driver: bridge

volumes:
  uploads:
    driver: local
